<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Abacus LMS - Student Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-light">

    <nav class="navbar navbar-expand-lg navbar-primary bg-primary shadow-sm">
        <div class="container-fluid px-3">
            <span class="navbar-brand fw-bold fs-5 text-white"><i class="fa-solid fa-graduation-cap me-2"></i>Student Portal</span>
            <button class="btn btn-light btn-sm fw-bold px-3 text-primary" id="logoutBtn">Logout</button>
        </div>
    </nav>

    <div class="container mt-4" id="dashboardSection">
        <div class="row g-4">
            <div class="col-md-6">
                <h5 class="fw-bold text-dark mb-3"><i class="fa-solid fa-file-signature me-2"></i>Available Tests</h5>
                <div id="availableTestsContainer"></div>
            </div>
            <div class="col-md-6">
                <h5 class="fw-bold text-dark mb-3"><i class="fa-solid fa-award me-2"></i>My Results</h5>
                <div id="myResultsContainer"></div>
            </div>
        </div>
    </div>

    <div class="container mt-4 d-none" id="testTakingSection">
        <div class="card border-0 shadow-lg rounded-4 p-4 mx-auto" style="max-width: 600px;">
            <div class="d-flex justify-content-between align-items-center mb-4 border-bottom pb-3">
                <h4 class="fw-bold text-primary mb-0" id="activeTestTitle">Test Title</h4>
                <button class="btn btn-outline-danger btn-sm fw-bold" onclick="cancelTest()">Cancel</button>
            </div>
            <div id="activeTestQuestions"></div>
            <button class="btn btn-success btn-lg w-100 fw-bold mt-4 shadow" onclick="submitTest()">Submit Answers</button>
        </div>
    </div>

    <div class="modal fade" id="reviewModal" tabindex="-1">
      <div class="modal-dialog modal-lg">
        <div class="modal-content border-0 shadow">
          <div class="modal-header bg-primary text-white border-0">
            <h5 class="modal-title fw-bold"><i class="fa-solid fa-chart-line me-2"></i>My Performance Review</h5>
            <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
          </div>
          <div class="modal-body bg-light">
            <h4 id="reviewTestName" class="text-dark fw-bold mb-3"></h4>
            <div class="table-responsive bg-white rounded-3 p-2 shadow-sm">
                <table class="table table-borderless table-hover align-middle text-center mb-0">
                    <thead class="border-bottom">
                        <tr class="text-muted small text-uppercase"><th>#</th><th>Stack</th><th>My Answer</th><th>Correct Answer</th><th>Result</th></tr>
                    </thead>
                    <tbody id="reviewTableBody"></tbody>
                </table>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="student.js"></script>
</body>
</html>
