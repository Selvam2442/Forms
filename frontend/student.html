<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Abacus LMS - Student Dashboard</title>
    <link rel="manifest" href="manifest.json">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script> 
    <style>
        .custom-radio .form-check-input { width: 1.5em; height: 1.5em; cursor: pointer; }
        .custom-radio .form-check-label { margin-left: 10px; cursor: pointer; padding-top: 3px; }
        .abacus-numbers { letter-spacing: 2px; line-height: 2.2; }
    </style>
</head>
<body class="bg-light">

    <div id="globalLoader" class="position-fixed w-100 h-100 flex-column align-items-center justify-content-center bg-body" style="z-index: 9999; top: 0; left: 0; transition: opacity 0.5s ease; display: flex;">
        <div class="spinner-border text-primary mb-3" style="width: 3rem; height: 3rem;" role="status"></div>
        <h4 class="text-primary fw-bold mb-2">Loading Your Portal...</h4>
        <p class="text-muted small text-center px-4">(Connecting to database...)</p>
    </div>

    <nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm">
        <div class="container-fluid px-3">
            <span class="navbar-brand fw-bold fs-5 text-white"><i class="fa-solid fa-graduation-cap me-2"></i>Student Portal</span>
            <div class="d-flex align-items-center">
                <span class="badge bg-warning text-dark me-3 fs-6 rounded-pill shadow-sm" id="streakDisplay" style="display:none;">
                    <i class="fa-solid fa-fire text-danger"></i> <span id="streakCount">0</span> Day Streak
                </span>
                <span class="text-white me-3 fw-bold d-none d-sm-inline" id="studentGreeting"><i class="fa-solid fa-user me-1"></i>Welcome</span>
                <button class="btn btn-light btn-sm fw-bold px-3 text-primary" id="logoutBtn">
                    <i class="fa-solid fa-power-off d-sm-none"></i><span class="d-none d-sm-inline"><i class="fa-solid fa-right-from-bracket me-2"></i>Logout</span>
                </button>
            </div>
        </div>
    </nav>

    <div class="container mt-4" id="dashboardSection">
        <div class="row g-4">
            <div class="col-md-6">
                <h5 class="fw-bold mb-3"><i class="fa-solid fa-file-signature me-2"></i>Available Tests</h5>
                <div id="availableTestsContainer"></div>
            </div>
            <div class="col-md-6">
                <h5 class="fw-bold mb-3"><i class="fa-solid fa-award me-2"></i>My Results</h5>
                <div id="myResultsContainer"></div>
            </div>
        </div>
    </div>

    <div class="container mt-4 d-none" id="testTakingSection">
        <div class="card border-0 shadow-lg rounded-4 p-4 mx-auto bg-body" style="max-width: 650px;">
            <div class="d-flex justify-content-between align-items-center mb-4 border-bottom pb-3">
                <div>
                    <h4 class="fw-bold text-primary mb-1" id="activeTestTitle">Test Title</h4>
                    <div class="badge bg-danger fs-6 shadow-sm" id="timerDisplay"><i class="fa-solid fa-clock me-1"></i>00:00</div>
                </div>
                <button class="btn btn-outline-danger btn-sm fw-bold px-3" onclick="cancelTest()">Cancel</button>
            </div>
            <div id="activeTestQuestions"></div>
            <button class="btn btn-success btn-lg w-100 fw-bold mt-4 shadow" onclick="submitTest()">Submit Test</button>
        </div>
    </div>

    <div class="modal fade" id="reviewModal" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content border-0 shadow">
                <div class="modal-header bg-primary text-white border-0">
                    <h5 class="modal-title fw-bold">Performance Review</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body bg-body">
                    
                    <div id="motivationCard" class="card border-0 shadow-sm rounded-4 mb-4 text-white p-4 text-center position-relative overflow-hidden" style="background: linear-gradient(135deg, #0d6efd, #6610f2);">
                        <i class="fa-solid fa-trophy position-absolute" style="top: -20px; right: -20px; opacity: 0.1; font-size: 150px;"></i>
                        <h6 class="fw-bold text-uppercase mb-1" style="letter-spacing: 2px; color: #e0e0e0;">AABFC Abacus Center</h6>
                        <h3 class="fw-bold mb-3" style="text-shadow: 1px 1px 2px rgba(0,0,0,0.2);">Great Job, <span id="cardStudentName"></span>!</h3>
                        <div class="display-3 fw-bold mb-1" id="cardScore" style="text-shadow: 2px 2px 4px rgba(0,0,0,0.3);">0</div>
                        <div class="fw-bold fs-5 text-warning mb-3" id="cardTestName">Test Name</div>
                        <p class="mb-0 fs-6 opacity-75" id="cardMessage">Keep up the fantastic work!</p>
                        <button class="btn btn-light text-success fw-bold rounded-pill mt-4 mx-auto px-4 shadow-sm" id="waShareResultBtn">
                            <i class="fa-brands fa-whatsapp fs-5 me-2 align-middle"></i>Share via WhatsApp
                        </button>
                    </div>

                    <h5 class="fw-bold text-dark mb-3">Answer Breakdown</h5>
                    <div class="table-responsive bg-body rounded-3 p-2 shadow-sm border">
                        <table class="table table-borderless table-hover align-middle text-center mb-0">
                            <thead class="border-bottom">
                                <tr class="text-muted small text-uppercase"><th>#</th><th>Stack</th><th>My Answer</th><th>Correct</th><th>Result</th></tr>
                            </thead>
                            <tbody id="reviewTableBody"></tbody>
                        </table>
                    </div>

                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="student.js"></script>
</body>
</html>
