<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Abacus LMS - Admin Control Hub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-light">

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm">
        <div class="container-fluid px-3">
            <span class="navbar-brand fw-bold fs-5"><i class="fa-solid fa-calculator me-2"></i>Abacus Admin</span>
            <button class="btn btn-danger btn-sm fw-bold px-3" id="logoutBtn"><i class="fa-solid fa-right-from-bracket me-2"></i>Logout</button>
        </div>
    </nav>

    <div class="container-fluid px-3 mt-4">
        
        <div class="row mb-4">
            <div class="col-12">
                <div class="card shadow-sm border-0 rounded-3 p-3 bg-white">
                    <h5 class="fw-bold mb-3 text-primary"><i class="fa-solid fa-chart-pie me-2"></i>Center Analytics</h5>
                    <div class="row">
                        <div class="col-md-6 mb-3"><canvas id="statusChart" style="max-height: 250px;"></canvas></div>
                        <div class="col-md-6 mb-3"><canvas id="scoreChart" style="max-height: 250px;"></canvas></div>
                    </div>
                </div>
            </div>
        </div>

        <div class="row g-4">
            
            <div class="col-12 col-xl-4">
                <div class="card shadow-sm border-0 rounded-3 p-3 mb-4 bg-white">
                    <h5 class="fw-bold mb-3 text-primary"><i class="fa-solid fa-user-plus me-2"></i>Enroll Student</h5>
                    <form id="createStudentForm">
                        <div class="mb-3">
                            <input type="text" id="studentName" class="form-control" placeholder="Student Full Name" required>
                        </div>
                        <button type="submit" class="btn btn-primary w-100 fw-bold">Generate ID</button>
                    </form>
                </div>

                <h5 class="fw-bold mb-3 text-warning text-uppercase"><i class="fa-solid fa-trophy me-2"></i>Rankings By Test</h5>
                <div id="adminLeaderboardContainer"></div>
            </div>

            <div class="col-12 col-xl-8">
                <h5 class="fw-bold mb-3 text-dark"><i class="fa-solid fa-clipboard-check me-2"></i>Submission Queue</h5>
                <div class="row row-cols-1 row-cols-md-2 g-3 mb-4" id="submissionsContainer"></div>

                <div class="card shadow-sm border-0 rounded-3 p-3 mb-4 bg-white">
                    <h5 class="fw-bold mb-3 text-primary"><i class="fa-solid fa-file-pen me-2"></i>Quiz Builder</h5>
                    <form id="createTestForm">
                        <div class="mb-3">
                            <input type="text" id="testTitle" class="form-control form-control-lg border-0 border-bottom" placeholder="Untitled Test" required style="border-radius: 0;">
                        </div>
                        <div class="mb-3 d-flex align-items-center">
                            <label class="small fw-bold text-muted me-2 text-nowrap"><i class="fa-solid fa-clock me-1"></i>MINS:</label>
                            <input type="number" id="testTime" class="form-control form-control-sm w-25" placeholder="10" required>
                        </div>
                        <div id="questionsContainer"></div>
                        <div class="d-flex justify-content-between mt-3">
                            <button type="button" id="addQuestionBtn" class="btn btn-outline-secondary btn-sm rounded-pill px-3"><i class="fa-solid fa-plus me-1"></i>Add</button>
                            <div>
                                <button type="submit" onclick="isDraftMode = true" class="btn btn-light btn-sm fw-bold me-2">Draft</button>
                                <button type="submit" onclick="isDraftMode = false" class="btn btn-success btn-sm fw-bold">Publish</button>
                            </div>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
    <script src="admin.js"></script>
</body>
</html>
