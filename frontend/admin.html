<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Abacus LMS - Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-light">

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm">
        <div class="container-fluid px-3">
            <span class="navbar-brand fw-bold fs-5"><i class="fa-solid fa-calculator me-2"></i>Abacus Admin</span>
            <button class="btn btn-danger btn-sm fw-bold px-3" id="logoutBtn"><i class="fa-solid fa-right-from-bracket me-2"></i>Logout</button>
        </div>
    </nav>

    <div class="container-fluid px-3 mt-4">
        <div class="row g-4">
            <div class="col-12 col-xl-4">
                <div class="card shadow-sm border-0 rounded-3 p-3 mb-4 bg-white">
                    <h5 class="fw-bold mb-3 text-primary"><i class="fa-solid fa-user-plus me-2"></i>Enroll Student</h5>
                    <form id="createStudentForm">
                        <div class="mb-3"><input type="text" id="studentName" class="form-control" placeholder="Student Full Name" required></div>
                        <button type="submit" class="btn btn-primary w-100 fw-bold">Generate ID</button>
                    </form>
                </div>

                <div class="card shadow-sm border-0 rounded-3 p-3 mb-4 bg-white">
                    <input type="text" id="searchStudentDir" class="form-control form-control-sm mb-2 bg-light border-0" placeholder="🔍 Search Directory...">
                    <div class="table-responsive">
                        <table class="table table-sm align-middle mb-0">
                            <thead><tr><th>ID</th><th>Name</th><th>PIN</th><th>Action</th></tr></thead>
                            <tbody id="studentTableBody"></tbody>
                        </table>
                    </div>
                </div>
            </div>

            <div class="col-12 col-xl-8">
                <h5 class="fw-bold mb-3 text-dark"><i class="fa-solid fa-clipboard-check me-2"></i>Submission Queue</h5>
                
                <div class="card shadow-sm border-0 bg-white p-2 mb-3 rounded-3">
                    <div class="row g-2">
                        <div class="col-md-4"><input type="text" id="filterStudentName" class="form-control form-control-sm bg-light border-0" placeholder="🔍 Find student..."></div>
                        <div class="col-md-4"><select id="filterStatus" class="form-select form-select-sm bg-light border-0"><option value="all">All Statuses</option><option value="pending_review">Awaiting Review</option><option value="graded">Approved</option></select></div>
                        <div class="col-md-4"><select id="filterTestName" class="form-select form-select-sm bg-light border-0"><option value="all">All Tests</option></select></div>
                    </div>
                </div>

                <div class="row row-cols-1 row-cols-md-2 g-3 mb-4" id="submissionsContainer"></div>

                <div class="card shadow-sm border-0 rounded-3 p-3 mb-4 bg-white">
                    <h5 class="fw-bold mb-3 text-primary"><i class="fa-solid fa-file-pen me-2"></i>Quiz Builder</h5>
                    <form id="createTestForm">
                        <div class="mb-3"><input type="text" id="testTitle" class="form-control form-control-lg border-0 border-bottom" placeholder="Untitled Test" required style="border-radius: 0;"></div>
                        <div class="mb-3 d-flex align-items-center">
                            <label class="small fw-bold text-muted me-2">MINS:</label>
                            <input type="number" id="testTime" class="form-control form-control-sm w-25" placeholder="10" required>
                        </div>
                        <div id="questionsContainer"></div>
                        <div class="d-flex justify-content-between mt-3">
                            <button type="button" id="addQuestionBtn" class="btn btn-outline-secondary btn-sm rounded-pill px-3">+ Add</button>
                            <div><button type="submit" onclick="isDraftMode = true" class="btn btn-light btn-sm fw-bold me-2">Draft</button><button type="submit" onclick="isDraftMode = false" class="btn btn-success btn-sm fw-bold">Publish</button></div>
                        </div>
                    </form>
                </div>

                <div class="card shadow-sm border-0 rounded-3 p-3 mb-5 bg-white">
                    <h5 class="fw-bold mb-2 text-dark">Managed Tests</h5>
                    <div class="table-responsive">
                        <table class="table table-sm align-middle mb-0">
                            <thead><tr><th>Title</th><th>Specs</th><th>Status</th><th>Actions</th></tr></thead>
                            <tbody id="testTableBody"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="reviewModal" tabindex="-1">
      <div class="modal-dialog modal-lg">
        <div class="modal-content border-0 shadow">
          <div class="modal-header bg-dark text-white border-0">
            <h5 class="modal-title fw-bold"><i class="fa-solid fa-magnifying-glass me-2"></i>Answer Breakdown</h5>
            <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
          </div>
          <div class="modal-body bg-light">
            <h4 id="reviewStudentName" class="text-primary fw-bold mb-0"></h4>
            <p class="text-muted small mb-3 fw-bold" id="reviewTestName"></p>
            <div class="table-responsive bg-white rounded-3 p-2 shadow-sm">
                <table class="table table-borderless table-hover align-middle text-center mb-0">
                    <thead class="border-bottom">
                        <tr class="text-muted small text-uppercase"><th>#</th><th>Stack</th><th>Student</th><th>Correct</th><th>Result</th></tr>
                    </thead>
                    <tbody id="reviewTableBody"></tbody>
                </table>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="admin.js"></script>
</body>
</html>
