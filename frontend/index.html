<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Abacus LMS - Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-light d-flex align-items-center justify-content-center vh-100">

    <div class="card shadow p-4 login-card">
        
        <div id="studentSection">
            <h3 class="text-center mb-4 fw-bold text-primary">Student Portal</h3>
            <form id="studentForm">
                <div class="mb-4">
                    <label for="studentRoll" class="form-label fw-semibold">Student Roll Number</label>
                    <input type="text" class="form-control form-control-lg" id="studentRoll" placeholder="e.g., AB001" autocomplete="off" required>
                </div>
                <div id="studentError" class="alert alert-danger d-none text-center p-2"></div>
                <button type="submit" class="btn btn-primary w-100 fw-bold fs-5 login-btn">Start Test</button>
            </form>
            <div class="text-center mt-4">
                <a href="#" id="showAdminBtn" class="text-muted text-decoration-none small">Admin Login ?</a>
            </div>
        </div>

        <div id="adminSection" class="d-none">
            <h3 class="text-center mb-4 fw-bold text-dark">Admin Access</h3>
            <form id="adminForm">
                <div class="mb-3">
                    <label for="adminName" class="form-label fw-semibold">Admin Name</label>
                    <input type="text" class="form-control" id="adminName" placeholder="e.g., ADMIN" autocomplete="off" required>
                </div>
                <div class="mb-4">
                    <label for="adminPin" class="form-label fw-semibold">Secure PIN</label>
                    <input type="password" class="form-control" id="adminPin" placeholder="****" required>
                </div>
                <div id="adminError" class="alert alert-danger d-none text-center p-2"></div>
                <button type="submit" class="btn btn-dark w-100 fw-bold fs-5 login-btn">Login as Admin</button>
            </form>
            <div class="text-center mt-4">
                <a href="#" id="showStudentBtn" class="text-muted text-decoration-none small">Student Login ?</a>
            </div>
        </div>

    </div>

    <script src="app.js"></script>
</body>
</html>
