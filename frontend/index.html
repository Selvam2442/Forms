<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AABFC Abacus - Login</title>
    <link rel="manifest" href="manifest.json">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background-color: #f8f9fa; }
        .login-card { max-width: 420px; width: 100%; border-radius: 1rem; border: none; box-shadow: 0 0.5rem 1rem rgba(0, 0, 0, 0.15); }
        .nav-pills .nav-link { color: #6c757d; }
        .nav-pills .nav-link.active { background-color: #0d6efd; color: white; }
    </style>
</head>
<body class="d-flex align-items-center justify-content-center vh-100">

    <div id="globalLoader" class="position-fixed w-100 h-100 flex-column align-items-center justify-content-center bg-light d-none" style="z-index: 9999; top: 0; left: 0; transition: opacity 0.5s ease; display: flex;">
        <div class="spinner-border text-primary mb-3" style="width: 3rem; height: 3rem;" role="status"></div>
        <h4 class="text-primary fw-bold mb-2">Authenticating...</h4>
        <p class="text-muted small text-center px-4">(Waking up secure servers. This may take up to 30 seconds on the first login. Please don't refresh!)</p>
    </div>

    <div class="container d-flex justify-content-center px-3">
        <div class="card login-card p-4 p-sm-5 bg-white">
            
            <div class="text-center mb-4">
                <h2 class="fw-bold text-primary mb-1"><i class="fa-solid fa-calculator me-2"></i>AABFC Center</h2>
                <p class="text-muted small fw-bold text-uppercase" style="letter-spacing: 1px;">Student Portal</p>
            </div>

            <ul class="nav nav-pills nav-justified mb-4 bg-light rounded-pill p-1 border" id="loginTabs" role="tablist">
                <li class="nav-item" role="presentation">
                    <button class="nav-link active fw-bold rounded-pill py-2" id="student-tab" data-bs-toggle="tab" data-bs-target="#student" type="button" role="tab">Student</button>
                </li>
                <li class="nav-item" role="presentation">
                    <button class="nav-link fw-bold rounded-pill py-2" id="admin-tab" data-bs-toggle="tab" data-bs-target="#admin" type="button" role="tab">Admin</button>
                </li>
            </ul>

            <div class="tab-content" id="loginTabsContent">
                
                <div class="tab-pane fade show active" id="student" role="tabpanel">
                    <form id="studentLoginForm">
                        <div class="mb-3">
                            <label class="form-label fw-bold text-muted small"><i class="fa-solid fa-id-badge me-1"></i> Student ID</label>
                            <input type="text" id="stuRollNumber" class="form-control form-control-lg bg-light" placeholder="e.g. STU1001" required>
                        </div>
                        <div class="mb-4">
                            <label class="form-label fw-bold text-muted small"><i class="fa-solid fa-lock me-1"></i> 4-Digit PIN</label>
                            
                            <div class="input-group">
                                <input type="password" id="stuPin" class="form-control form-control-lg bg-light border-end-0" placeholder="Enter PIN" required>
                                <button class="btn btn-light border border-start-0 bg-light" type="button" onclick="togglePassword('stuPin', this)">
                                    <i class="fa-solid fa-eye text-muted"></i>
                                </button>
                            </div>

                        </div>
                        <button type="submit" class="btn btn-primary btn-lg w-100 fw-bold rounded-pill shadow-sm">Login to Portal <i class="fa-solid fa-arrow-right ms-2"></i></button>
                    </form>
                </div>

                <div class="tab-pane fade" id="admin" role="tabpanel">
                    <form id="adminLoginForm">
                        <div class="mb-3">
                            <label class="form-label fw-bold text-muted small"><i class="fa-solid fa-user-shield me-1"></i> Admin Username</label>
                            <input type="text" id="adminUser" class="form-control form-control-lg bg-light" placeholder="Enter username" required>
                        </div>
                        <div class="mb-4">
                            <label class="form-label fw-bold text-muted small"><i class="fa-solid fa-key me-1"></i> Password</label>
                            
                            <div class="input-group">
                                <input type="password" id="adminPass" class="form-control form-control-lg bg-light border-end-0" placeholder="Enter password" required>
                                <button class="btn btn-light border border-start-0 bg-light" type="button" onclick="togglePassword('adminPass', this)">
                                    <i class="fa-solid fa-eye text-muted"></i>
                                </button>
                            </div>

                        </div>
                        <button type="submit" class="btn btn-dark btn-lg w-100 fw-bold rounded-pill shadow-sm">Access Dashboard <i class="fa-solid fa-arrow-right ms-2"></i></button>
                    </form>
                </div>

            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Check for Service Worker (PWA installability)
        if ('serviceWorker' in navigator) { 
            navigator.serviceWorker.register('sw.js').catch(err => console.log('SW registration failed')); 
        }

        const BASE_URL = 'https://forms-xg9n.onrender.com';
        
        // 🔥 Universal Password Visibility Toggle Function
        function togglePassword(inputId, buttonElement) {
            const input = document.getElementById(inputId);
            const icon = buttonElement.querySelector('i');
            
            if (input.type === 'password') {
                input.type = 'text';
                icon.classList.remove('fa-eye');
                icon.classList.add('fa-eye-slash');
            } else {
                input.type = 'password';
                icon.classList.remove('fa-eye-slash');
                icon.classList.add('fa-eye');
            }
        }

        // Authentication Engine
        async function handleLogin(e, role) {
            e.preventDefault();
            
            // Show wake-up loader
            document.getElementById('globalLoader').classList.remove('d-none');
            
            const identifier = role === 'student' ? document.getElementById('stuRollNumber').value : document.getElementById('adminUser').value;
            const secret = role === 'student' ? document.getElementById('stuPin').value : document.getElementById('adminPass').value;
            
            try {
                const res = await fetch(`${BASE_URL}/api/auth/login`, { 
                    method: 'POST', 
                    headers: { 'Content-Type': 'application/json' }, 
                    body: JSON.stringify({ role, identifier, secret }) 
                });
                
                const data = await res.json();
                
                if (res.ok) { 
                    // Save Token and Redirect
                    localStorage.setItem('token', data.token); 
                    window.location.href = role === 'student' ? 'student.html' : 'admin.html'; 
                } else { 
                    // Hide loader and show error
                    document.getElementById('globalLoader').classList.add('d-none');
                    alert(data.error || "Invalid credentials."); 
                }
            } catch (err) { 
                document.getElementById('globalLoader').classList.add('d-none');
                alert("Server connection error. Please try again."); 
            }
        }

        // Event Listeners
        document.getElementById('studentLoginForm').addEventListener('submit', (e) => handleLogin(e, 'student'));
        document.getElementById('adminLoginForm').addEventListener('submit', (e) => handleLogin(e, 'admin'));
    </script>
</body>
</html>
